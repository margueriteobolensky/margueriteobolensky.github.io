- title: "Protect or Prepare? Crop Insurance and Adaptation in a Changing Climate"
  pdflink: "/pdf/obolensky_crop_insurance_JMP.pdf"
  note: "Winner of the 2025 Rising Star Paper Prize at the International Industrial Organization Conference"
  extranote: "Updated: April 2026"
  abstract: >
    As climate risks intensify, governments increasingly subsidize insurance against weather shocks. While these subsidies enhance short-run financial protection, they may dampen incentives for long-run adaptation to climate change. This paper studies how U.S. crop insurance subsidies shape agricultural adaptation. I develop and estimate a dynamic land-use model in which forward-looking farmers form beliefs about climate trends and make joint planting and insurance decisions under alternative subsidy regimes. Targeting subsidies toward regions with slower projected increases in climate risk partially mitigates the distortions created by the status quo by improving the spatial allocation of production. However, most gains come from decoupling subsidies from actuarially fair premiums, thereby restoring adaptation incentives.

- title: "Migration, Climate Similarity, and the Consequences of Climate Mismatch"
  pdflink: "https://drive.google.com/file/d/11uSqCe0v0tCWvDNjQDjqEEOngoFAt5pf/edit"
  coauthors: "Marco Tabellini and Charles Taylor"
  note: "Revise and Resubmit, Quaterly Journal of Economics"
  extranote: "Updated: January 2026"
  links:
    - url: "https://www.nber.org/papers/w32035"
      text: "NBER version"
  press_coverage:
    - title: "VoxEU"
      url: "https://cepr.org/voxeu/columns/homeward-bound-how-migrants-seek-out-familiar-climates"
  abstract: >
    This paper examines the concept of “climate matching” in migration---the idea that migrants seek out destinations with familiar climates. Focusing on the US, we document that temperature distance between origin and destination predicts the distribution of migrants across counties. This pattern holds for internal and international migration in the past (1850-1940) and today (2011-2019), and is not explained by the spatial correlation of climate or the persistence of ethnic networks. We provide suggestive evidence for two mechanisms driving climate matching: climate-specific skills and climate-as-amenity. Then, we study the implications of climate matching for migrants. Leveraging plausibly exogenous variation in climate mismatch, we document that climate distance reduces life expectancy among immigrants, and increases mortality rates for their US-born children. We calculate an individual-level mortality cost of a  1°C change in climate to be \$5,250.


- title: "Local Crop Diversity and Pest Diffusion: Evidence from the Boll Weevil"
  extranote: "Updated: December 2025"
  pdflink: "https://tristandupuy.github.io/Crop_Diversity.pdf"
  coauthors: "Emma Du Puy"
  abstract: >
    Modern agricultural landscapes are becoming increasingly homogeneous, driven by the rise of monoculture and the pursuit of economies of scale through larger, more contiguous tracts of land. 
    The ecological consequences of this landscape simplification remain poorly quantified. We use the historical diffusion of the boll weevil across the U.S. Cotton Belt to causally link crop diversity to pest resilience. 
    By developing a harmonized dataset that links historical agricultural censuses over time and leveraging terrain ruggedness as an instrument for local crop diversity, we show that more diverse croplands significantly 
    slow pest spread. A one-standard-deviation increase in crop diversity reduces annual contamination risk by 12 percentage points, or 36 percent relative to the mean annual risk.
    This study demonstrates that enhancing crop diversity can serve as an important component of sustainable pest management.



